<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色选择 - 澳洲储能电站</title>
    
    <script>
        (function() {
            var saved = localStorage.getItem('au002_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
    
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .role-select-container {
            max-width: 600px;
            width: 100%;
            padding: var(--spacing-xl);
            text-align: center;
        }

        .role-header {
            margin-bottom: var(--spacing-xl);
        }

        .role-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: var(--spacing-md);
            background: linear-gradient(135deg, var(--text-primary), var(--color-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .role-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .role-card {
            padding: var(--spacing-xl);
            background: var(--bg-card);
            border: 2px solid var(--border-secondary);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .role-card:hover {
            border-color: var(--color-primary);
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0, 255, 136, 0.2);
        }

        .role-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
            display: block;
        }

        .role-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }

        .role-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .back-link {
            color: var(--text-tertiary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--color-primary);
        }
    </style>
</head>
<body>
    <div class="role-select-container">
        <div class="role-header">
            <h1 class="role-title">选择您的角色</h1>
            <p class="role-subtitle">
                请选择您的身份以进入澳洲储能电站管理系统<br>
                不同角色拥有不同的功能权限和访问范围
            </p>
        </div>

        <div class="role-grid">
            <div class="role-card" data-role="owner">
                <span class="role-icon">🏢</span>
                <div class="role-name">业主方</div>
                <div class="role-description">
                    查看投资回报、资产状态<br>
                    监控运维方表现<br>
                    管理电站资产配置
                </div>
            </div>

            <div class="role-card" data-role="operator">
                <span class="role-icon">⚡</span>
                <div class="role-name">运维方</div>
                <div class="role-description">
                    实时调度控制<br>
                    收益优化策略<br>
                    设备状态监控
                </div>
            </div>
        </div>

        <a href="/pages/login.html" class="back-link">← 返回登录页面</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否已登录
            const session = JSON.parse(localStorage.getItem('au002_session') || '{}');
            if (!session.token) {
                // 未登录，跳转到登录页
                window.location.href = '/pages/login.html';
                return;
            }

            // 角色选择事件
            const roleCards = document.querySelectorAll('.role-card');
            roleCards.forEach(card => {
                card.addEventListener('click', function() {
                    const role = this.dataset.role;
                    
                    // 更新会话信息
                    session.role = role;
                    session.timestamp = Date.now();
                    localStorage.setItem('au002_session', JSON.stringify(session));

                    // 根据角色跳转到对应页面
                    if (role === 'owner') {
                        window.location.href = '/pages/owner/dashboard.html';
                    } else if (role === 'operator') {
                        window.location.href = '/pages/operator/dispatch.html';
                    }
                });
            });
        });
    </script>
</body>
</html>
