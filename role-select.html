<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="design-system.css">
    <script src="page-transition.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-key="roleSelect.pageTitle">角色选择 - U Energy</title>
    <link rel="stylesheet" href="components/common-styles.css">
    <link rel="stylesheet" href="components/i18n.css">
    <link rel="stylesheet" href="components/header-nav.css">
    <link rel="stylesheet" href="components/standard-layout.css">
    <link rel="stylesheet" href="components/user-dropdown.css">
    <script src="components/i18n.js"></script>
    <script src="components/user-menu-link.js"></script>
    <script src="components/simple-message-icon.js"></script>
    <script src="components/user-dropdown-simple-new.js"></script>
    <script src="components/header-nav.js"></script>
    <style>
        /* ========== Role Select Page Styles ========== */
        body {
            background: var(--bg-base, #000) !important;
            margin: 0;
            padding: 0;
        }

        .role-select-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px var(--page-padding, 24px) 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Page Title */
        .role-page-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary, rgba(255, 255, 255, 0.9));
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .role-page-subtitle {
            font-size: 15px;
            color: var(--text-secondary, rgba(255, 255, 255, 0.6));
            text-align: center;
            margin-bottom: 48px;
        }

        /* Cards Container - 1x2 centered layout */
        .role-cards-container {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 860px;
            width: 100%;
        }

        /* Role Card - Industrial Design */
        .role-card {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            background: var(--bg-card, rgba(23, 23, 23, 0.8));
            border: 1px solid var(--border-default, rgba(255, 255, 255, 0.08));
            border-radius: var(--radius-md, 12px);
            padding: 32px 28px 28px;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: border-color var(--transition-fast, 150ms ease);
        }

        .role-card:hover {
            border-color: var(--border-hover, rgba(255, 255, 255, 0.15));
        }

        .role-card:active {
            border-color: var(--color-primary, #00ff88);
        }

        /* Icon */
        .role-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-sm, 8px);
            background: rgba(0, 255, 136, 0.06);
            border: 1px solid rgba(0, 255, 136, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .role-icon svg {
            width: 28px;
            height: 28px;
            color: var(--color-primary, #00ff88);
        }

        /* Card Text */
        .role-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary, rgba(255, 255, 255, 0.9));
            margin-bottom: 4px;
        }

        .role-subtitle {
            font-size: 13px;
            color: var(--text-tertiary, rgba(255, 255, 255, 0.4));
            margin-bottom: 14px;
        }

        .role-desc {
            font-size: 14px;
            color: var(--text-secondary, rgba(255, 255, 255, 0.6));
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Feature List */
        .feature-list {
            list-style: none;
            margin: 0;
            padding: 0;
            margin-bottom: 24px;
        }

        .feature-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            font-size: 14px;
            color: var(--text-secondary, rgba(255, 255, 255, 0.6));
        }

        .feature-list li .check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0, 255, 136, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .feature-list li .check svg {
            width: 11px;
            height: 11px;
            color: var(--color-primary, #00ff88);
        }

        /* Action Button */
        .role-btn {
            width: 100%;
            padding: 12px 0;
            border: 1px solid var(--color-primary, #00ff88);
            border-radius: var(--radius-sm, 8px);
            background: transparent;
            color: var(--color-primary, #00ff88);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast, 150ms ease);
            margin-top: auto;
            letter-spacing: 0.3px;
        }

        .role-btn:hover {
            background: var(--color-primary, #00ff88);
            color: #000;
        }

        /* Footer */
        .role-footer {
            text-align: center;
            padding: 32px 0 24px;
        }

        .role-footer a {
            color: var(--text-tertiary, rgba(255, 255, 255, 0.4));
            text-decoration: none;
            font-size: 13px;
            transition: color var(--transition-fast, 150ms ease);
        }

        .role-footer a:hover {
            color: var(--color-primary, #00ff88);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .role-select-container {
                padding: 80px 16px 40px;
            }

            .role-cards-container {
                flex-direction: column;
                align-items: center;
            }

            .role-card {
                min-width: 280px;
                max-width: 100%;
            }

            .role-page-title {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .role-select-container {
                padding: 68px 12px 32px;
            }

            .role-page-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Standard Header Nav Container -->
    <div id="headerContainer"></div>

    <!-- Main Content -->
    <div class="role-select-container">
        <h1 class="role-page-title" data-i18n="roleSelect.title">选择您的角色</h1>
        <p class="role-page-subtitle" data-i18n="roleSelect.subtitle">请选择登录角色以进入系统</p>

        <div class="role-cards-container">

            <!-- Owner Card -->
            <div class="role-card" onclick="selectRole('owner')">
                <div class="role-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                <div class="role-title" data-i18n="roleSelect.ownerTitle">业主</div>
                <div class="role-subtitle" data-i18n="roleSelect.ownerSubtitle">Property Owner</div>
                <div class="role-desc" data-i18n="roleSelect.ownerDesc">创建并管理电站，处理设备故障，分配运维方账号，全面掌控电站资产。</div>
                <ul class="feature-list">
                    <li>
                        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <span data-i18n="roleSelect.ownerF1">创建电站与查看运行数据</span>
                    </li>
                    <li>
                        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <span data-i18n="roleSelect.ownerF2">故障查看与处理</span>
                    </li>
                    <li>
                        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <span data-i18n="roleSelect.ownerF3">创建运维方并分配电站</span>
                    </li>
                </ul>
                <button class="role-btn" data-i18n="roleSelect.ownerBtn">进入业主面板</button>
            </div>

            <!-- Operator Card -->
            <div class="role-card" onclick="selectRole('operator')">
                <div class="role-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </div>
                <div class="role-title" data-i18n="roleSelect.operatorTitle">运维方</div>
                <div class="role-subtitle" data-i18n="roleSelect.operatorSubtitle">O&M Provider</div>
                <div class="role-desc" data-i18n="roleSelect.operatorDesc">智能调度归属电站，查看电量收益报表，记录历史调度操作，高效运维管理。</div>
                <ul class="feature-list">
                    <li>
                        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <span data-i18n="roleSelect.operatorF1">AI 智能调度</span>
                    </li>
                    <li>
                        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <span data-i18n="roleSelect.operatorF2">查看归属站点运行数据</span>
                    </li>
                    <li>
                        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <span data-i18n="roleSelect.operatorF3">电量收益报表</span>
                    </li>
                    <li>
                        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <span data-i18n="roleSelect.operatorF4">历史调度记录</span>
                    </li>
                </ul>
                <button class="role-btn" data-i18n="roleSelect.operatorBtn">进入运维面板</button>
            </div>

        </div>

        <!-- Footer -->
        <div class="role-footer">
            <a href="#" onclick="logout(); return false;" data-i18n="roleSelect.logoutLink">退出登录</a>
        </div>
    </div>

    <script>
    // ==================== Login Guard ====================
    (function() {
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'vpp-login.html';
        }
    })();

    // ==================== Init Header Nav ====================
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize HeaderNav (same as station.html / dashboard.html)
        if (typeof HeaderNav !== 'undefined') {
            new HeaderNav({
                currentPage: 'roleSelect',
                containerId: 'headerContainer',
                showMessageCenter: false,
                showUserAvatar: true,
                showLanguageSelector: true
            });
        }

        // Apply translations to role-select specific elements
        if (window.i18n && typeof window.i18n.updatePageTexts === 'function') {
            setTimeout(function() {
                window.i18n.updatePageTexts();
            }, 200);
        }
    });

    // ==================== Role Selection ====================
    function selectRole(role) {
        localStorage.setItem('userRole', role);
        var target = role === 'owner' ? 'station.html' : 'dashboard.html';
        if (window.__navigate) {
            window.__navigate(target);
        } else {
            window.location.href = target;
        }
    }

    // ==================== Logout ====================
    function logout() {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('userName');
        localStorage.removeItem('userEmail');
        localStorage.removeItem('userRole');
        if (window.__navigate) {
            window.__navigate('vpp-login.html');
        } else {
            window.location.href = 'vpp-login.html';
        }
    }
    </script>

</body>
</html>
